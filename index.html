<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="王珺怡的个人网站与线上烘焙坊：记录经历、作品、兴趣与探索。"
    >
    <title>ZeroBaker｜王珺怡的个人网站</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到主要内容</a>

    <header class="site-header" data-header>
      <a class="logo" href="#home" aria-label="返回 ZeroBaker 首页">
        <img
          src="assets/images/home/logo-zero-baker.png"
          alt="ZeroBaker"
          width="800"
          height="600"
          loading="eager"
        >
      </a>
      <button
        class="nav-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-navigation"
        aria-label="打开导航菜单"
      >
        <span class="nav-toggle-line" aria-hidden="true"></span>
        <span class="nav-toggle-line" aria-hidden="true"></span>
        <span class="nav-toggle-line" aria-hidden="true"></span>
      </button>
      <nav id="site-navigation" class="site-nav" aria-label="主要导航" data-site-nav></nav>
    </header>

    <main id="main-content">
      <section id="home" class="section hero" aria-labelledby="hero-title">
        <svg class="layover-path" viewBox="0 0 1200 720" aria-hidden="true">
          <path
            id="layover-curve"
            d="M 135 610 C 250 470, 365 565, 500 470 S 760 295, 1090 425"
          ></path>
          <text dy="-42">
            <textPath href="#layover-curve" startOffset="12%">L A Y O V E R</textPath>
          </text>
        </svg>

        <div class="section-inner hero-content">
          <div class="hero-copy">
            <p class="eyebrow" data-home-eyebrow></p>
            <h1 id="hero-title" data-home-title></h1>
            <p class="hero-intro" data-home-intro></p>
            <p class="layover-note" data-home-layover></p>
          </div>

          <figure class="hero-person">
            <img
              src="assets/images/home/home-jeju-back-view.png"
              alt="王珺怡在济州岛行走的背影拼贴"
              width="433"
              height="577"
              loading="eager"
            >
          </figure>

          <div class="cake-links" aria-label="首页板块导航" data-cake-links>
          </div>
        </div>
      </section>

      <section id="about" class="section about-section" aria-labelledby="about-title">
        <div class="section-inner about-inner">
          <header class="about-heading">
            <p class="eyebrow" data-about-english-title></p>
            <h2 id="about-title" data-about-title></h2>
            <p class="section-lead" data-about-intro></p>
          </header>

          <div class="about-layout">
            <figure class="about-visual">
              <div class="about-photo-frame">
                <img
                  data-about-image
                  width="1199"
                  height="1596"
                  loading="lazy"
                >
              </div>
            </figure>
            <div class="about-cards" data-about-cards></div>
          </div>
        </div>
      </section>

      <section
        id="projects"
        class="section projects-section"
        aria-labelledby="projects-title"
      >
        <div class="projects-decorations" data-project-decorations aria-hidden="true"></div>
        <div class="section-inner projects-inner">
          <header class="projects-heading">
            <p class="eyebrow" data-projects-english-title></p>
            <h2 id="projects-title" data-projects-title></h2>
            <p class="section-lead" data-projects-intro></p>
          </header>
          <div class="projects-grid" data-project-list></div>
        </div>
      </section>

      <section id="recipes" class="section recipes-section" aria-labelledby="recipes-title">
        <div class="recipe-worktable-decoration" aria-hidden="true"></div>
        <div class="section-inner recipes-inner">
          <header class="recipes-heading">
            <p class="eyebrow" data-recipes-english-title></p>
            <h2 id="recipes-title" data-recipes-title></h2>
            <p class="section-lead" data-recipes-intro></p>
          </header>
          <div class="recipe-paper-field" data-recipe-list></div>
        </div>
      </section>

      <section id="contact" class="section contact-section" aria-labelledby="contact-title">
        <div class="contact-decorations" aria-hidden="true">
          <span class="contact-decoration contact-decoration--fork"></span>
          <span class="contact-decoration contact-decoration--crumbs"></span>
          <span class="contact-decoration contact-decoration--curve"></span>
        </div>
        <div class="section-inner contact-layout">
          <header class="contact-heading">
            <p class="eyebrow" data-contact-english-title></p>
            <h2 id="contact-title" data-contact-title></h2>
          </header>
          <div class="contact-intro">
            <p class="contact-intro-cn" data-contact-intro-cn></p>
            <p class="contact-intro-en" data-contact-intro-en></p>
          </div>
          <figure class="contact-photo">
            <span class="contact-photo-tape" aria-hidden="true"></span>
            <img
              data-contact-image
              width="1280"
              height="1280"
              loading="lazy"
              decoding="async"
            >
          </figure>
          <div class="social-links" aria-label="公开联系方式" data-social-links></div>
        </div>
        <p class="closing-line" data-contact-closing-line></p>
      </section>
    </main>

    <footer class="site-footer">
      <p>
        <span data-footer-site-name></span>
        <span aria-hidden="true"> · </span>
        <span data-current-year></span>
        <span aria-hidden="true"> · </span>
        <span data-footer-message></span>
      </p>
    </footer>

    <noscript>
      <p class="noscript-message">请启用 JavaScript，以显示作品、烘焙秘方和联系方式。</p>
    </noscript>

    <div class="recipe-modal" data-recipe-modal hidden>
      <div class="recipe-modal-backdrop" data-recipe-close aria-hidden="true"></div>
      <div
        class="recipe-modal-paper"
        role="dialog"
        aria-modal="true"
        aria-labelledby="recipe-modal-title"
        aria-describedby="recipe-modal-body"
        tabindex="-1"
        data-recipe-dialog
      >
        <button class="recipe-modal-close" type="button" aria-label="关闭秘方" data-recipe-close>
          <span aria-hidden="true">×</span>
        </button>
        <div class="recipe-modal-content" data-recipe-modal-content></div>
      </div>
    </div>

    <script src="content.js"></script>
    <script src="script.js"></script>
  </body>
</html>
