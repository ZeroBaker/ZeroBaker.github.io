<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="王珺怡的个人网站与线上烘焙坊：记录经历、作品、兴趣与探索。"
    >
    <title>ZeroBaker｜王珺怡的个人网站</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <a class="skip-link" href="#main-content">跳到主要内容</a>

    <header class="site-header" data-header>
      <a class="logo" href="#home" aria-label="返回 ZeroBaker 首页">
        <img
          src="assets/images/home/logo-zero-baker.png"
          alt="ZeroBaker"
          width="800"
          height="600"
          loading="eager"
        >
      </a>
      <button
        class="nav-toggle"
        type="button"
        aria-expanded="false"
        aria-controls="site-navigation"
        aria-label="打开导航菜单"
      >
        <span class="nav-toggle-line" aria-hidden="true"></span>
        <span class="nav-toggle-line" aria-hidden="true"></span>
        <span class="nav-toggle-line" aria-hidden="true"></span>
      </button>
      <nav id="site-navigation" class="site-nav" aria-label="主要导航" data-site-nav></nav>
    </header>

    <main id="main-content">
      <section id="home" class="section hero" aria-labelledby="hero-title">
        <svg class="layover-path" viewBox="0 0 1200 720" aria-hidden="true">
          <path
            id="layover-curve"
            d="M 135 610 C 250 470, 365 565, 500 470 S 760 295, 1090 425"
          ></path>
          <text dy="-42">
            <textPath href="#layover-curve" startOffset="12%">L A Y O V E R</textPath>
          </text>
        </svg>

        <div class="section-inner hero-content">
          <div class="hero-copy">
            <p class="eyebrow" data-home-eyebrow></p>
            <h1 id="hero-title" data-home-title></h1>
            <p class="hero-intro" data-home-intro></p>
            <p class="layover-note" data-home-layover></p>
          </div>

          <figure class="hero-person">
            <img
              src="assets/images/home/home-jeju-back-view.png"
              alt="王珺怡在济州岛行走的背影拼贴"
              width="433"
              height="577"
              loading="eager"
            >
          </figure>

          <div class="cake-links" aria-label="首页板块导航" data-cake-links>
          </div>
        </div>
      </section>

      <section id="about" class="section about-section" aria-labelledby="about-title">
        <div class="section-inner about-inner">
          <header class="about-heading">
            <p class="eyebrow" data-about-english-title></p>
            <h2 id="about-title" data-about-title></h2>
            <p class="section-lead" data-about-intro></p>
          </header>

          <div class="about-layout">
            <figure class="about-visual">
              <div class="about-photo-frame">
                <img
                  data-about-image
                  width="1199"
                  height="1596"
                  loading="lazy"
                >
              </div>
            </figure>
            <div class="about-cards" data-about-cards></div>
          </div>
        </div>
      </section>

      <section id="projects" class="section" aria-labelledby="projects-title">
        <div class="section-inner">
          <p class="eyebrow">Freshly Baked</p>
          <h2 id="projects-title">作品展示</h2>
          <p class="section-lead">
            这里将展示视频创作、内容运营、活动项目和未来的 AI 尝试。
          </p>
          <div class="card-grid" data-project-list></div>
        </div>
      </section>

      <section id="recipes" class="section section-tinted" aria-labelledby="recipes-title">
        <div class="section-inner">
          <p class="eyebrow">Secret Recipes</p>
          <h2 id="recipes-title">烘焙秘方</h2>
          <p class="section-lead">
            音乐、旅行、影视、生活片段和最近感兴趣的事，会慢慢收藏在这里。
          </p>
          <div class="recipe-grid" data-recipe-list></div>
        </div>
      </section>

      <section id="contact" class="section" aria-labelledby="contact-title">
        <div class="section-inner contact-layout">
          <div>
            <p class="eyebrow">Find Me</p>
            <h2 id="contact-title">联系方式</h2>
            <p class="section-lead">欢迎通过下面的公开渠道找到我。</p>
            <div class="social-links" data-social-links></div>
          </div>
          <div class="placeholder contact-photo-placeholder" role="img" aria-label="甜品照片占位区域">
            甜品照片占位：assets/images/contact/contact-dessert.jpg
          </div>
        </div>
        <p class="closing-line">Maybe we could be slow dancing</p>
      </section>
    </main>

    <footer class="site-footer">
      <p>© <span data-current-year></span> Wang Junyi · Made with curiosity and care.</p>
    </footer>

    <noscript>
      <p class="noscript-message">请启用 JavaScript，以显示作品、烘焙秘方和联系方式。</p>
    </noscript>
    <script src="content.js"></script>
    <script src="script.js"></script>
  </body>
</html>
